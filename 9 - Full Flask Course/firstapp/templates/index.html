{% extends 'base.html' %}

{% block title %}
Index Page
{% endblock %}

{% block content %}
    <h1>Welcome to the Flask App!</h1>
    <p>{{ myvalue }}</p>
    <p>The result is: {{ myresult }}</p>
    <ul>
        {% for item in mylist %}
            <li {% if item == 30 %}style="color: red;"{% endif %}>{{ item }}</li>
        {% endfor %}
    </ul>

    <a href="{{ url_for('other') }}">Other</a>
{% endblock %}
